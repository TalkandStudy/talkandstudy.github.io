<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>71电影网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: #f8f9fa;
            padding: 30px 20px;
            max-width: 700px;
            margin: 0 auto;
        }

        .card-container {
            width: 260px;
            margin: 0 auto 25px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .title-card {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        .plain span:first-child {
            font-size: 32px;
            color: #e74c3c;
            font-weight: bold;
        }
        .plain span:last-child {
            font-size: 14px;
            color: #666;
        }
        .description {
            margin: 10px 0;
            color: #555;
        }


        .btn-box {
            text-align: center;
            margin: 20px 0;
        }
        #viewBtn {
            padding: 10px 25px;
            font-size: 16px;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #viewBtn:hover {
            background: #c0392b;
        }


        .tip {
            text-align: center;
            color: #e74c3c;
            margin: 10px 0;
            font-size: 14px;
        }


        .code-box {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px dashed #ccc;
        }
        .code-box h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #333;
            font-weight: normal;
        }
        #inviteCode {
            padding: 8px 10px;
            width: 220px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .code-box button {
            padding: 8px 15px;
            margin-left: 5px;
            border: 1px solid #3498db;
            background: #3498db;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
        }
        #tip {
            margin-top: 10px;
            font-size: 14px;
        }


        #main-content {
            display: none;
            margin-top: 30px;
        }
        video {
            width: 100%;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<!-- 极简付费卡片 -->
<div class="card-container">
    <div class="title-card">71 电影网</div>
    <div class="card-content">
        <p class="plain">
            <span>￥399</span>
            <span>/部</span>
        </p>
        <p class="description">付费观看此视频</p>
    </div>
</div>

<!-- 购买按钮 -->
<div class="btn-box">
    <button id="viewBtn">立即购买</button>
</div>
<div class="tip" id="tipText"></div>


<div class="code-box">
    <h3>或输入已购买邀请码观看</h3>
    <input type="password" id="inviteCode" placeholder="请输入邀请码">
    <button onclick="checkCode()">验证</button>
    <div id="tip"></div>
</div>


<div id="main-content">
    <video src="https://img.naixiai.cn/2026/03/20/d34174b2e5af709ca3e03049da6ecfde.mp4" controls poster="https://img.naixiai.cn/2026/03/20/d34174b2e5af709ca3e03049da6ecfde.fr.jpeg"></video>
</div>

<script>
    // 购买提示
    const btn = document.getElementById('viewBtn');
    const tipText = document.getElementById('tipText');
    btn.addEventListener('click', () => {
        tipText.textContent = "服务器繁忙，请稍后重试";
    });

    // 邀请码验证
    const CORRECT_HASH = "4b43b5658695ac473edb45406ecfeb7346c6787d2bcc7f932483d12e1bf8362e";
    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function checkCode() {
        const code = document.getElementById('inviteCode').value;
        const tip = document.getElementById('tip');
        const content = document.getElementById('main-content');

        const inputHash = await sha256(code);
        if (inputHash === CORRECT_HASH) {
            tip.innerText = "验证成功！";
            tip.style.color = "#27ae60";
            content.style.display = "block";
            document.querySelector('.code-box').style.display = "none";
        } else {
            tip.innerText = "请先购买邀请码";
            tip.style.color = "#e74c3c";
        }
    }
</script>
</body>
</html>
