    <style>
        #web_head{
            padding: 20px 0;
            margin: 0;
        }
        /* From Uiverse.io by BlackisPlay */
        /* I do some change */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        body {
            min-height: 100vh;
            background: #f5f5f5;
            text-align: center;
            padding: 0 15px;
        }


        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin: 20px auto;
        }


        .cls-1 {
            fill: #1E88E5;
            animation: cls1 4s ease infinite both;
        }
        @keyframes cls1 {
            0% { fill: #1E88E5; }
            34% { fill: #0D47A1; }
            66% { fill: #42A5F5; }
            100% { fill: #1E88E5; }
        }
        .cls-2 {
            fill: #42A5F5;
            animation: cls2 4s ease infinite both;
        }
        @keyframes cls2 {
            0% { fill: #42A5F5; }
            34% { fill: #1E88E5; }
            66% { fill: #0D47A1; }
            100% { fill: #42A5F5; }
        }
        .cls-3 {
            fill: #0D47A1;
            animation: cls3 4s ease infinite both;
        }
        @keyframes cls3 {
            0% { fill: #0D47A1; }
            34% { fill: #42A5F5; }
            66% { fill: #1E88E5; }
            100% { fill: #0D47A1; }
        }

        .cls-1,
        .cls-2,
        .cls-3 {
            stroke-width: 0px;
        }
        .cls-4 {
            display: none;
        }

        #triangle {
            height: 400px;
            width: 400px;
            padding-top: 30px;
            animation: triangle 4s both infinite;
        }
        @keyframes triangle {
            0% { transform: translateY(0px); }
            50% { transform: translateY(15px); }
            100% { transform: translateY(0px); }
        }


        #web_body {
            max-width: 800px;
            margin: 0 auto;
            text-align: left;
        }
        #web_body h2 {
            margin: 20px 0 10px;
            color: #333;
        }
        #web_body a {
            display: block;
            margin: 8px 0;
            color: #0066cc;
            text-decoration: none;
        }
        #web_body a:hover {
            text-decoration: underline;
        }
        #web_footer {
            margin-top: 50px;
            padding: 20px 0;
        }
        .btn {
            display: inline-block;
            width: 100px;
            height: 30px;
            line-height: 35px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-pink {
            background-color: #FB7299;
        }

        .btn-black {
            background-color: #1a1a1a;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
